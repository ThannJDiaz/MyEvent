<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Entradas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  background:#F5F7FA;
  font-family:Arial,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:1rem;
}

.container{
  width:100%;
  max-width:32rem;
  background:white;
  border-radius:1.5rem;
  padding:2rem;
  box-shadow:
    0 0.5rem 2rem
    rgba(0,0,0,.08);
  text-align:center;
}

h1{
  color:#1F2937;
  font-size:2rem;
  margin-bottom:0.5rem;
}

#subtitulo{
  color:#6B7280;
  margin-bottom:1.5rem;
}

#reader{
  width:100%;
  max-width:30rem;
  margin:auto;
  display:none;
  overflow:hidden;
  border-radius:1rem;
}

button{
  border:none;
  cursor:pointer;
  padding:1rem 2rem;
  border-radius:0.75rem;
  font-size:1rem;
}

#btnIniciar{
  background:#2563EB;
  color:white;
  font-weight:600;
  width:100%;
  padding:1rem;
}

#resultado{
  display:none;
  margin-top:1rem;
  padding:1.5rem;
  border-radius:1rem;
  color:white;
}

#resultado h2{
  margin-bottom:1rem;
  font-size:1.6rem;
}

#resultado strong{
  font-size:1.4rem;
}

.verde{
  background:#2E7D32;
}

.amarillo{
  background:#F9A825;
}

.rojo{
  background:#C62828;
}

.info{
  margin-top:1rem;
  line-height:1.8;
}

.btnNuevo{
  margin-top:1.5rem;
  background:white;
  color:#111827;
  font-weight:600;
  padding:0.8rem 1.5rem;
  border-radius:999px;
}
</style>
</head>

<body>
<audio id="audioExito">
  <source src="exito.mp3" type="audio/mpeg">
</audio>

<audio id="audioAdvertencia">
  <source src="advertencia.mp3" type="audio/mpeg">
</audio>

<audio id="audioError">
  <source src="error.mp3" type="audio/mpeg">
</audio>
  
<div class="container">
  <h1>Control de Acceso</h1>
  <p id="subtitulo">
    Control de acceso de invitados
  </p>
  <button id="btnIniciar">
    Iniciar escáner
  </button>

  <div id="reader"></div>
  <div id="resultado"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby6T1GZrQm5wc_pADozM3hzfwEEwCTnn2OUKoJt3ya-q_Uh5A_O2FnWcxG7Kimofwrd/exec";
let scanner;
const reader = document.getElementById("reader");
const resultado = document.getElementById("resultado");

/*document
  .getElementById("btnIniciar")
  .addEventListener("click",iniciarEscaner);*/

document
  .getElementById("btnIniciar")
  .addEventListener(
    "click",
    () => {
    [
      "audioExito",
      "audioAdvertencia",
      "audioError"
    ].forEach(id => {
      const audio =
        document.getElementById(id);
        audio.play()
          .then(() => {
            audio.pause();
            audio.currentTime = 0;
        })
        .catch(() => {});
    });
    iniciarEscaner();
  }
);

function iniciarEscaner(){
  resultado.style.display = "none";

  document
    .getElementById("btnIniciar")
    .style.display = "none";

  reader.style.display = "block";
  scanner = new Html5Qrcode("reader");
  scanner.start(
    {
      facingMode:"environment"
    },
    {
      fps:10,
      qrbox:250
    },
    qrDetectado
  )
  .catch(error => {
    alert(
      "Error al iniciar la cámara:\n\n" +
      error
    );

    document
      .getElementById("btnIniciar")
      .style.display = "inline-block";
  });
}

async function qrDetectado(codigo){
  codigo = codigo.trim();
  await scanner.stop();

  try{
    const respuesta =
      await fetch(
        API_URL +
        "?codigo=" +
        encodeURIComponent(codigo)
      );

    const data = await respuesta.json();
    mostrarResultado(data);
  }

  catch(error){
    mostrarError("No fue posible consultar la API.");
  }
}

function reproducirExito(){
  const audio = document.getElementById("audioExito");
  audio.currentTime = 0;
  audio.play();
}

function reproducirAdvertencia(){
  const audio = document.getElementById("audioAdvertencia");
  audio.currentTime = 0;
  audio.play();
}

function reproducirError(){
  const audio = document.getElementById("audioError");
  audio.currentTime = 0;
  audio.play();
}

function mostrarResultado(data){
  resultado.style.display = "block";
  reader.style.display = "none";

  if(data.estado === "autorizado"){
    resultado.className = "verde";
    reproducirExito();
    resultado.innerHTML =
      "<h2>✅ ACCESO AUTORIZADO</h2>" +
      "<div class='info'>" +
      "<strong>" +
      data.nombre +
      "</strong><br><br>" +
      "Confirmados: " +
      data.confirmados +
      "<br>" +
      "Menú Infantil: " +
      data.menuInfantil +
      "<br>" +
      "Mesa: " +
      data.mesa +
      "<br><br>" +
      "Hora: " +
      data.horaEntrada +
      "</div>";
  }

  else if(data.estado === "registrado"){
    resultado.className = "amarillo";
    reproducirAdvertencia();
    resultado.innerHTML =
      "<h2>⚠ YA INGRESÓ</h2>" +
      "<div class='info'>" +
      "<strong>" +
      data.nombre +
      "</strong><br><br>" +
      "Confirmados: " +
      data.confirmados +
      "<br>" +
      "Menú Infantil: " +
      data.menuInfantil +
      "<br>" +
      "Mesa: " +
      data.mesa +
      "<br><br>" +
      "Hora registrada:<br>" +
      data.horaEntrada +
      "</div>";
  }

  else{
    resultado.className = "rojo";
    reproducirError();
    resultado.innerHTML =
      "<h2>❌ QR NO VÁLIDO</h2>";
  }
  
  resultado.innerHTML +=
    "<br>" +
    "<button class='btnNuevo' onclick='nuevoEscaneo()'>" +
    "Escanear siguiente" +
    "</button>";
}

function mostrarError(texto){
  resultado.style.display = "block";
  resultado.className = "rojo";
  resultado.innerHTML =
    "<h2>✕ ERROR</h2>" +
    "<div class='info'>" +
    texto +
    "</div>" +
    "<br>" +
    "<button class='btnNuevo' onclick='nuevoEscaneo()'>" +
    "Escanear siguiente" +
    "</button>";
}

function nuevoEscaneo(){
  resultado.style.display = "none";
  reader.innerHTML = "";
  iniciarEscaner();
}
  
</script>
</body>

</html>
