<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeria</title>

<style>
  
</style>
</head>

<body>
  <input
    type="file"
    id="fotoInput"
    accept="image/*">

  <button
    onclick="subirFoto()">
    Subir Foto
  </button>

  <input
    type="file"
    id="videoInput"
    accept="video/*">

  <button
    onclick="subirVideo()">
    Subir Video
  </button>

  <input
    type="file"
    id="archivoInput"
    accept="image/*,video/*"
    multiple
    hidden>

  <button id="btnCompartir">
    📸 Compartir recuerdos
  </button>

  <div id="estado"></div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbxvMFi6P1hCeKGmdOd-jQ3fuTYtm7hLuumSemuYcJmglV9MuFFe4emExTBVr4WxV7kO/exec";

  function archivoABase64(archivo){
    return new Promise(
      (resolve)=>{  
        const reader = new FileReader();
  
        reader.onload = function(){  
            resolve(  
              reader.result
              .split(",")[1]  
            );  
          };
  
        reader.readAsDataURL(archivo);  
      }
    );  
  }

  async function subirArchivo(archivo){
    const estado = document.getElementById("estado");
  
    estado.innerHTML = "Subiendo...";
  
    const base64 = await archivoABase64(archivo);
  
    const respuesta =
      await fetch(API_URL,{  
          method:"POST",  
          body:
            JSON.stringify({  
              nombre: archivo.name,  
              mimeType: archivo.type,  
              base64: base64  
            })  
        }
      );
  
    const resultado = await respuesta.json();
  
    if(resultado.ok){  
      estado.innerHTML = "Archivo cargado correctamente";  
    }  
    else{
      estado.innerHTML = resultado.error;  
    }
  }

  document
    .getElementById("btnCompartir")
    .addEventListener(
      "click",
      () => {    
        document
          .getElementById("archivoInput")
          .click();    
      }
    );

  document
    .getElementById("archivoInput")
    .addEventListener(
      "change",
      async function(){
        /*for(const archivo of this.files){*/
          const archivo = this.files[0];
              
          if(!archivo){
            return;
          }
      
          if(archivo.type.startsWith("image/")){    
            if(archivo.size > (10 * 1024 * 1024)){
              alert(
                "La foto supera 10 MB"
              );    
              return;
            }    
          }    
          else if(archivo.type.startsWith("video/")){    
            if(archivo.size > (100 * 1024 * 1024)){    
              alert(
                "El video supera 100 MB"
              );    
              return;
            }    
          }
      
          await subirArchivo(archivo);    
        }
      );
      /*}*/

  async function subirFoto(){
    const archivo =
      document
      .getElementById("fotoInput")
      .files[0];
  
    if(!archivo){  
      alert(
        "Seleccione una foto"
      );
      return;
    }
  
    if(archivo.size > (10 * 1024 * 1024)){  
      alert(
        "Máximo 10 MB"
      );  
      return;  
    }
  
    await subirArchivo(archivo);  
  }

  async function subirVideo(){
    const archivo =
      document
      .getElementById("videoInput")
      .files[0];
  
    if(!archivo){  
      alert(
        "Seleccione un video"
      );  
      return;  
    }
  
    if(archivo.size > (100 * 1024 * 1024)){  
      alert(
        "Máximo 100 MB"
      );
      return;
    }
  
    await subirArchivo(archivo);
  }
</script>
</body>
</html>
