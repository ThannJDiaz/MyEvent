<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeria</title>

<style>
  #filtros{
    display:flex;  
    justify-content:center;  
    gap:1rem;  
    margin:1rem 0;  
  }
  
  #filtros button{  
    background:#D4A64A;  
    border:none;  
    border-radius:1rem;  
    padding:.5rem 1rem;  
    cursor:pointer;  
  }
  
  .acciones{
    display:flex;
    justify-content:flex-end;
    margin:1rem 1rem 0.3rem 1rem;
  }

  #btnCompartir{
    background:#D4A949;
    border:none;
    border-radius:2rem;
    padding:0.5rem 1rem;
    font-size:1.1rem;
    cursor:pointer;
  }

  #galeria{
    column-count: 5;
    column-gap: 0.8rem;
  }

  .card{
    break-inside: avoid;
    margin-bottom: 1rem;
    overflow: hidden;
    border-radius: 1rem;
    background: white;
    box-shadow:0 .2rem .8rem rgba(0,0,0,.15);
  }

  .card img{
    width:100%;
    display:block;
  }
  
  .card video{  
    width:100%;  
    display:block;  
  }

  .card iframe{
    width:100%;
    height="480";
    frameborder="0";
    allowfullscreen="";
    border:none;  
    border-radius:1rem;  
  }
  
  .video-card{
    position:relative;
    display:block;
    overflow:hidden;
    border-radius:1rem;
  }

  .video-card img{
    width:100%;
    display:block;
  }

  .play-icon{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:70px;
    height:70px;
    border-radius:50%;
    background:rgba(0,0,0,0.5);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:2rem;
    font-weight:bold;
  }
  
  #overlayCarga{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.75);
    z-index:99999;
  }

  .cargaContenido{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:2rem;
    border-radius:1.5rem;
    width:80%;
    max-width:400px;
    text-align:center;
  }

  .spinner{
    width:60px;
    height:60px;
    margin:auto;
    border:6px solid #ddd;
    border-top:6px solid #D4A949;
    border-radius:50%;
    animation:girar 1s linear infinite;
  }

  @keyframes girar{
    from{
      transform:rotate(0deg);
    }

    to{
      transform:rotate(360deg);
    }
  }

  .barra{
    width:100%;
    height:10px;
    background:#eee;
    border-radius:1rem;
    overflow:hidden;
    margin-top:1rem;
  }

  #progreso{
    width:0%;
    height:100%;
    background:#D4A949;
  }
  
  @media(max-width:768px){
    #galeria{
      column-count:2;
    }
    .acciones{
    justify-content:center;
    }
  }
  
  #visor{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    z-index:9999;
  }

  #fotoGrande{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    max-width:95%;
    max-height:95%;
  }

  #visor span{
    position:absolute;
    top:1rem;
    right:1rem;
    color:white;
    font-size:2rem;
    cursor:pointer;
  }

</style>
</head>

<body>
  <div class="acciones">
    <button id="btnCompartir">
      📸 Compartir recuerdos
    </button>
  </div>
  
  <div id="filtros"> 
    <button
      onclick="filtrar('todo')">
      Todos
    </button>
  
    <button
      onclick="filtrar('foto')">
      Fotos
    </button>
  
    <button
      onclick="filtrar('video')">
      Videos
    </button>
  </div>

  <div id="galeria"></div>
  
  <input
    type="file"
    id="archivoInput"
    accept="image/*,video/*"
    multiple
    hidden>
  
  <div id="visor">
    <span
      onclick="cerrarFoto()">
      ✕
    </span>
    <img id="fotoGrande">
  </div>
  
  <div id="overlayCarga">
    <div class="cargaContenido">
      <div class="spinner"></div>

      <p id="textoCarga">
        Subiendo recuerdos...
      </p>

      <div class="barra">
        <div id="progreso"></div>
      </div>
    </div>
  </div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbxvMFi6P1hCeKGmdOd-jQ3fuTYtm7hLuumSemuYcJmglV9MuFFe4emExTBVr4WxV7kO/exec";
  let galeriaCompleta = [];
  let fotosGaleria = [];  
  let indiceActual = 0;  
  let touchStartX = 0;  
  let touchEndX = 0;

  function archivoABase64(archivo){
    return new Promise(
      (resolve)=>{  
        const reader = new FileReader();
  
        reader.onload = function(){  
            resolve(  
              reader.result
              .split(",")[1]  
            );  
          };
  
        reader.readAsDataURL(archivo);  
      }
    );  
  }

  function renderGaleria(elementos){  
    const galeria = document.getElementById("galeria");
    galeria.innerHTML = "";
    fotosGaleria =
      elementos.filter(
        item =>
          item.tipo == "foto"
      );
    let indiceFoto = 0;
    elementos.forEach(
      item => {        
        if(item.tipo == "foto"){  
          galeria.innerHTML +=
          `
          <div class="card">  
            <img 
              src="https://drive.google.com/thumbnail?id=${item.id}&sz=w1200"
              onclick="abrirFoto(${indiceFoto})"">  
          </div>
          `;
          indiceFoto++;
        }
        else{  
          galeria.innerHTML += `
            <div class="card">
              <a
  href="https://drive.google.com/file/d/${item.id}/view"
  target="_blank"
  class="video-card">

  <img
    src="https://drive.google.com/thumbnail?id=${item.id}&sz=w1200">

  <div class="play-icon">
    ▶
  </div>

</a>
          </div>
        `;          
        }  
      }
    );  
  }

  async function cargarGaleria(){
    const respuesta =
    await fetch(
      API_URL,
      {
        method:"POST",
        body:
          JSON.stringify({
            action:"listar"  
          })
      }
    );
    galeriaCompleta = await respuesta.json();
    console.log(galeriaCompleta);
    renderGaleria(galeriaCompleta);
  }
  
  function abrirFoto(indice){
    indiceActual = indice;
    document
      .getElementById("fotoGrande")
      .src = "https://drive.google.com/thumbnail?id=" + fotosGaleria[indiceActual].id + "&sz=w2000";

    document
      .getElementById("visor")
      .style.display = "block";
  }

  function cerrarFoto(){
    document
      .getElementById("visor")
      .style.display ="none";
  }
  
  function fotoSiguiente(){
    if(indiceActual < fotosGaleria.length - 1){
      indiceActual++;
      actualizarFoto();
    }
  }
  
  function fotoAnterior(){
    if(indiceActual > 0){
      indiceActual--;
      actualizarFoto();
    }
  }
  
  function actualizarFoto(){
    document
      .getElementById("fotoGrande")
      .src = "https://drive.google.com/thumbnail?id=" + fotosGaleria[indiceActual].id + "&sz=w2000";
  }
  
  const visor = document.getElementById("visor");
  
  visor.addEventListener(
    "touchstart", e => {
      touchStartX =
        e.changedTouches[0]
         .screenX;
    }
  );
  
  visor.addEventListener(
    "touchend", e => {
      touchEndX =
        e.changedTouches[0]
         .screenX;
      manejarSwipe();
    }
  );
  
  function manejarSwipe(){
    const distancia = touchEndX - touchStartX;
    if(distancia > 50){
      fotoAnterior();
    }
    else if(distancia < -50){
      fotoSiguiente();
    }
  }
  
  function mostrarCarga(){
    document
      .getElementById("overlayCarga")
      .style.display = "block";
    
    document
      .getElementById("progreso")
      .style.width = "0%";
    
    document
      .getElementById("textoCarga")
      .innerText = "Compartiendo archivos...";
  }
  
  function ocultarCarga(){
    document
      .getElementById("overlayCarga")
      .style.display = "none";
  }

  async function subirArchivo(archivo){  
    const base64 = await archivoABase64(archivo);
  
    const respuesta =
      await fetch(API_URL,{  
          method:"POST",  
          body:
            JSON.stringify({  
              nombre: archivo.name,  
              mimeType: archivo.type,  
              base64: base64  
            })  
        }
      );
  
    const resultado = await respuesta.json();
  
    if(!resultado.ok){  
      alert(resultado.error);
    }
  }

  document
    .getElementById("btnCompartir")
    .addEventListener(
      "click",
      () => {    
        document
          .getElementById("archivoInput")
          .click();    
      }
    );

  document
    .getElementById("archivoInput")
    .addEventListener(
      "change",
      async function(){
        mostrarCarga();
        const total = this.files.length;
        
        let contador = 0;
        for(const archivo of this.files){         
          if(!archivo){
            return;
          }
      
          if(archivo.type.startsWith("image/")){    
            if(archivo.size > (10 * 1024 * 1024)){
              alert(
                "La foto supera 10 MB"
              );    
              return;
            }    
          }    
          else if(archivo.type.startsWith("video/")){    
            if(archivo.size > (100 * 1024 * 1024)){    
              alert(
                "El video supera 100 MB"
              );    
              return;
            }    
          }
      
          await subirArchivo(archivo);
          
          contador++;
          const porcentaje =
            Math.round((contador / total) * 100);

          document
            .getElementById("progreso")
            .style.width = porcentaje + "%";
          document
            .getElementById("textoCarga")
            .innerText = `Subiendo ${contador} de ${total}`;
        }
        
        ocultarCarga();
        cargarGaleria();
      }
  );

  function filtrar(tipo){  
    if(tipo == "todo"){  
      renderGaleria(galeriaCompleta);  
      return;  
    }
  
    const filtrados = galeriaCompleta.filter(  
        item =>
          item.tipo ==
          tipo  
      );
  
    renderGaleria(filtrados);  
  }

  cargarGaleria();  

  </script>
</body>
</html>
