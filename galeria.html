<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeria</title>

<style>
  #filtros{
    display:flex;  
    justify-content:center;  
    gap:1rem;  
    margin:2rem 0;  
  }
  
  #filtros button{  
    background:#D4A64A;  
    border:none;  
    border-radius:1rem;  
    padding:.75rem 1.5rem;  
    cursor:pointer;  
  }
  
  #galeria{
    column-count: 3;
    column-gap: 1rem;
  }

  .card{
    break-inside: avoid;
    margin-bottom: 1rem;
    overflow: hidden;
    border-radius: 1rem;
    background: white;
    box-shadow:0 .2rem .8rem rgba(0,0,0,.15);
  }

  .card img{
    width:100%;
    display:block;
  }
  
  .card video{  
    width:100%;  
    display:block;  
  }

  .card iframe{
    width:100%;
    height="480";
    frameborder="0";
    allowfullscreen="";
    /*width:100%;  
    height:20rem;*/
    border:none;  
    border-radius:1rem;  
  }
  
  .video-card{
    position:relative;
    display:block;
    overflow:hidden;
    border-radius:1rem;
  }

  .video-card img{
    width:100%;
    display:block;
  }

  .play-icon{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:70px;
    height:70px;
    border-radius:50%;
    background:rgba(0,0,0,0.5);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:2rem;
    font-weight:bold;
  }
  
  @media(max-width:768px){
    #galeria{
      column-count:2;
    }
  }
  
  #visor{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    z-index:9999;
  }

  #fotoGrande{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    max-width:95%;
    max-height:95%;
  }

  #visor span{
    position:absolute;
    top:1rem;
    right:1rem;
    color:white;
    font-size:2rem;
    cursor:pointer;
  }

</style>
</head>

<body>
  <div id="filtros">
  
    <button
      onclick="filtrar('todo')">
      Todos
    </button>
  
    <button
      onclick="filtrar('foto')">
      Fotos
    </button>
  
    <button
      onclick="filtrar('video')">
      Videos
    </button>
  </div>

  <div id="galeria"></div>
  
  <input
    type="file"
    id="archivoInput"
    accept="image/*,video/*"
    multiple
    hidden>

  <button id="btnCompartir">
    📸 Compartir recuerdos
  </button>

  <div id="estado"></div>
  
  <div id="visor">
    <span
      onclick="cerrarFoto()">
      ✕
    </span>
    <img id="fotoGrande">
  </div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbxvMFi6P1hCeKGmdOd-jQ3fuTYtm7hLuumSemuYcJmglV9MuFFe4emExTBVr4WxV7kO/exec";
  let galeriaCompleta = [];

  function archivoABase64(archivo){
    return new Promise(
      (resolve)=>{  
        const reader = new FileReader();
  
        reader.onload = function(){  
            resolve(  
              reader.result
              .split(",")[1]  
            );  
          };
  
        reader.readAsDataURL(archivo);  
      }
    );  
  }

  function renderGaleria(elementos){  
    const galeria = document.getElementById("galeria");
    galeria.innerHTML = "";
    elementos.forEach(
      item => {        
        if(item.tipo == "foto"){  
          galeria.innerHTML +=
          `
          <div class="card">  
            <img 
              src="https://drive.google.com/thumbnail?id=${item.id}&sz=w1200"
              onclick="abrirFoto(this.src)">  
          </div>
          `;  
        }
        else{  
          galeria.innerHTML += `
            <div class="card">
              <a
                href="https://drive.google.com/file/d/${item.id}/view"
                target="_blank"
                class="video-card">              
                <img
                  src="https://drive.google.com/thumbnail?id=${item.id}&sz=w1200">              
                <div class="play-icon">
                  ▶
                </div>              
              </a>
          </div>
        `;          
        }  
      }
    );  
  }

  async function cargarGaleria(){
    const respuesta =
    await fetch(
      API_URL,
      {
        method:"POST",
        body:
          JSON.stringify({
            action:"listar"  
          })
      }
    );
    galeriaCompleta = await respuesta.json();
    console.log(galeriaCompleta);
    renderGaleria(galeriaCompleta);
  }
  
  function abrirFoto(src){
    document
      .getElementById("fotoGrande")
      .src = src;
    document
      .getElementById("visor")
      .style.display = "block";
  }

  function cerrarFoto(){
    document
      .getElementById("visor")
      .style.display ="none";
  }

  async function subirArchivo(archivo){
    const estado = document.getElementById("estado");
  
    estado.innerHTML = "Subiendo...";
  
    const base64 = await archivoABase64(archivo);
  
    const respuesta =
      await fetch(API_URL,{  
          method:"POST",  
          body:
            JSON.stringify({  
              nombre: archivo.name,  
              mimeType: archivo.type,  
              base64: base64  
            })  
        }
      );
  
    const resultado = await respuesta.json();
  
    if(resultado.ok){  
      estado.innerHTML = "✓ Archivo cargado";
      cargarGaleria();
    }  
    else{
      estado.innerHTML = resultado.error;  
    }
  }

  document
    .getElementById("btnCompartir")
    .addEventListener(
      "click",
      () => {    
        document
          .getElementById("archivoInput")
          .click();    
      }
    );

  document
    .getElementById("archivoInput")
    .addEventListener(
      "change",
      async function(){
        for(const archivo of this.files){
          /*const archivo = this.files[0];*/
              
          if(!archivo){
            return;
          }
      
          if(archivo.type.startsWith("image/")){    
            if(archivo.size > (10 * 1024 * 1024)){
              alert(
                "La foto supera 10 MB"
              );    
              return;
            }    
          }    
          else if(archivo.type.startsWith("video/")){    
            if(archivo.size > (100 * 1024 * 1024)){    
              alert(
                "El video supera 100 MB"
              );    
              return;
            }    
          }
      
          await subirArchivo(archivo);
        }
      }
      );

  function filtrar(tipo){  
    if(tipo == "todo"){  
      renderGaleria(galeriaCompleta);  
      return;  
    }
  
    const filtrados = galeriaCompleta.filter(  
        item =>
          item.tipo ==
          tipo  
      );
  
    renderGaleria(filtrados);  
  }

  cargarGaleria();  

  </script>
</body>
</html>
